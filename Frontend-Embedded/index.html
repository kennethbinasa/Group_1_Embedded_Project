<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroSense – Smart Irrigation Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────────────── -->
  <nav class="agro-nav">
    <div class="agro-brand">
      <span class="brand-icon">🌱</span>
      <span class="brand-name">AgroSense</span>
    </div>
    <span class="nav-subtitle">Smart Irrigation Dashboard</span>
  </nav>

  <!-- ── MAIN CONTENT ───────────────────────────────────────── -->
  <main class="container-fluid px-4 py-4">

    <!-- STAT CARDS -->
    <div class="row g-3 mb-3">

      <!-- Soil Moisture -->
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-label">Soil Moisture</div>
          <div class="stat-value moisture">
            <i class="bi bi-droplet-fill"></i>
            <span id="soilMoisture">32%</span>
          </div>
          <span class="stat-badge badge-low" id="moistureBadge">Low</span>
        </div>
      </div>

      <!-- Temperature -->
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-label">Temperature</div>
          <div class="stat-value temperature">
            <i class="bi bi-thermometer-half"></i>
            <span id="temperature">26°C</span>
          </div>
        </div>
      </div>

      <!-- Humidity -->
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-label">Humidity</div>
          <div class="stat-value humidity">
            <i class="bi bi-cloud-fill"></i>
            <span id="humidity">65%</span>
          </div>
        </div>
      </div>

      <!-- Pump Status -->
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-label">Pump Status</div>
          <div class="stat-value pump">
            <i class="bi bi-power" id="pumpIcon"></i>
          </div>
          <span class="stat-badge" id="pumpBadge">Pump: ON</span>
        </div>
      </div>

    </div><!-- /row stat cards -->

    <!-- CONTROLS -->
    <div class="controls-bar mb-3">
      <span class="controls-label">Controls</span>
      <button class="btn-agro btn-water" id="btnManualWater" onclick="manualWater()">
        Manual Water Now &nbsp;<i class="bi bi-chevron-right"></i>
      </button>
      <button class="btn-agro btn-pump-off" id="btnPumpToggle" onclick="togglePump()">
        Turn Pump OFF
      </button>
    </div>

    <!-- CHARTS ROW -->
    <div class="row g-3 mb-3">

      <!-- Line Chart -->
      <div class="col-12 col-md-7">
        <div class="chart-card">
          <div class="chart-card-header">
            <span><span class="chart-icon">🌿</span> Soil Moisture Levels</span>
            <select class="range-select" id="rangeSelect" onchange="updateRange(this.value)">
              <option value="24">Last 24 Hours</option>
              <option value="12">Last 12 Hours</option>
              <option value="7">Last 7 Days</option>
            </select>
          </div>
          <div class="chart-wrapper">
            <canvas id="moistureLineChart"></canvas>
          </div>
          <div class="chart-legend">
            <span class="legend-dot dot-optimal"></span> Optimal Threshold
            <span class="legend-dot dot-low ms-3"></span> Low Threshold
          </div>
        </div>
      </div>

      <!-- Bar Chart -->
      <div class="col-12 col-md-5">
        <div class="chart-card">
          <div class="chart-card-header">
            <span><strong>History</strong> Overview</span>
          </div>
          <p class="chart-sub">Avg. Moisture Levels</p>
          <div class="chart-wrapper">
            <canvas id="historyBarChart"></canvas>
          </div>
        </div>
      </div>

    </div><!-- /charts row -->

    <!-- FOOTER STATUS -->
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <div class="status-bar">
          <i class="bi bi-wifi status-icon"></i>
          <span>Connected to: <strong>AgroSense Network</strong></span>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="status-bar">
          <i class="bi bi-database-fill status-icon"></i>
          <span>Data Logged: <strong id="dataLogged">240 Entries</strong></span>
        </div>
      </div>
    </div>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- App JS -->
  <script src="assets/js/app.js"></script>
</body>
</html>
