services:
  - type: web
    name: agrosense-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    rootDir: Backend-Embedded
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: INGEST_API_KEY
        sync: false
